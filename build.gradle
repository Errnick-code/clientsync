        ':versions:1.21.3:remapJar',
        ':versions:1.21.4:remapJar',
        ':versions:1.21.5:remapJar',
        ':versions:1.21.6:remapJar',
        ':versions:1.21.7:remapJar',
        ':versions:1.21.8:remapJar',
        ':versions:1.21.9:remapJar',
        ':versions:1.21.10:remapJar',
        ':versions:1.21.11:remapJar',
        ':versions:26.1.2:jar',
        ':versions:26.2:jar',
        ':installer-app:shadowJar',
        generateMergedModJson
]) {
    group             = 'clientsync'
    description       = 'JiJ main build'
    archiveBaseName   = 'clientsync-1.0.0+1.20-26.2'
    archiveClassifier = ''
    archiveVersion    = ''
    destinationDirectory = layout.buildDirectory.dir('libs')

    from({ project(':versions:1.20.1').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.20.1.jar' }
    }
    from({ project(':versions:1.20.2').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.20.2.jar' }
    }
    from({ project(':versions:1.20.4').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.20.4.jar' }
    }
    from({ project(':versions:1.20.6').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.20.6.jar' }
    }
    from({ project(':versions:1.21.1').tasks.remapJar.archiveFile }) {

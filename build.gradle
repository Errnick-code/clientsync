        rename { 'clientsync-1.21.1.jar' }
    }
    from({ project(':versions:1.21.3').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.3.jar' }
    }
    from({ project(':versions:1.21.4').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.4.jar' }
    }
    from({ project(':versions:1.21.5').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.5.jar' }
    }
    from({ project(':versions:1.21.6').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.6.jar' }
    }
    from({ project(':versions:1.21.7').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.7.jar' }
    }
    from({ project(':versions:1.21.8').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.8.jar' }
    }
    from({ project(':versions:1.21.9').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.9.jar' }
    }
    from({ project(':versions:1.21.10').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.10.jar' }
    }
    from({ project(':versions:1.21.11').tasks.remapJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-1.21.11.jar' }
    }
    from({ project(':versions:26.1.2').tasks.jar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-26.1.2.jar' }
    }
    from({ project(':versions:26.2').tasks.jar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-26.2.jar' }
    }
    from({ project(':installer-app').tasks.shadowJar.archiveFile }) {
        into 'META-INF/jars/'
        rename { 'clientsync-installer.jar' }
    }
    from(generateMergedModJson.outputs) {
        include 'fabric.mod.json'
    }
    from(project(':versions:1.21.11').file('src/main/resources/assets/clientsync/icon.png')) {
